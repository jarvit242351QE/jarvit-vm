name: Release VM Package

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build vm-updater plugin
        working-directory: plugins/vm-updater
        run: |
          npm install
          npm run build

      - name: Build jarvit-router plugin
        working-directory: plugins/jarvit-router
        run: |
          npm install
          npm run build

      - name: Generate manifest
        run: |
          python3 scripts/generate-manifest.py "${{ github.ref_name }}"

      - name: Package release
        run: |
          # Create the files/ directory structure that mirrors the VM filesystem
          mkdir -p release-pkg/files/opt/jarvit/scripts
          mkdir -p release-pkg/files/opt/jarvit/plugins/vm-updater/dist
          mkdir -p release-pkg/files/opt/jarvit/plugins/jarvit-router/dist
          mkdir -p release-pkg/files/opt/jarvit/plugins/memory-core
          mkdir -p release-pkg/files/opt/jarvit/config

          # Copy update scripts
          cp scripts/vm-auto-update.sh release-pkg/files/opt/jarvit/scripts/
          cp scripts/vm-simple-update.sh release-pkg/files/opt/jarvit/scripts/
          cp scripts/generate-manifest.py release-pkg/files/opt/jarvit/scripts/
          chmod +x release-pkg/files/opt/jarvit/scripts/*.sh

          # Copy entrypoint (needed for rootfs bootstrap injection)
          cp scripts/entrypoint.sh release-pkg/files/opt/jarvit/entrypoint.sh
          chmod +x release-pkg/files/opt/jarvit/entrypoint.sh

          # Copy init.sh as /sbin/init (needed for rootfs bootstrap injection)
          mkdir -p release-pkg/files/sbin
          cp scripts/init.sh release-pkg/files/sbin/init
          chmod +x release-pkg/files/sbin/init

          # Copy vm-updater plugin (including root index.js for plugin discovery)
          cp plugins/vm-updater/index.js release-pkg/files/opt/jarvit/plugins/vm-updater/
          cp plugins/vm-updater/jarvit.plugin.json release-pkg/files/opt/jarvit/plugins/vm-updater/
          cp plugins/vm-updater/package.json release-pkg/files/opt/jarvit/plugins/vm-updater/
          cp plugins/vm-updater/dist/index.js release-pkg/files/opt/jarvit/plugins/vm-updater/dist/

          # Copy jarvit-router plugin (manifest + compiled JS)
          cp plugins/jarvit-router/openclaw.plugin.json release-pkg/files/opt/jarvit/plugins/jarvit-router/
          cp plugins/jarvit-router/package.json release-pkg/files/opt/jarvit/plugins/jarvit-router/
          cp plugins/jarvit-router/dist/index.js release-pkg/files/opt/jarvit/plugins/jarvit-router/dist/

          # Copy memory-core plugin
          cp plugins/memory-core/index.ts release-pkg/files/opt/jarvit/plugins/memory-core/
          cp plugins/memory-core/jarvit.plugin.json release-pkg/files/opt/jarvit/plugins/memory-core/
          cp plugins/memory-core/package.json release-pkg/files/opt/jarvit/plugins/memory-core/

          # Copy config template (protected during updates)
          cp config/jarvit.json release-pkg/files/opt/jarvit/config/jarvit.json || true

          # Copy memory tree seed (needed for first-boot memory setup)
          cp memory-tree-seed.tar.gz release-pkg/files/opt/jarvit/memory-tree-seed.tar.gz || true

          # Copy manifest and changelog
          cp manifest.json release-pkg/
          cp CHANGELOG.md release-pkg/ 2>/dev/null || echo "No changelog" > release-pkg/CHANGELOG.md

          # Create tarball
          cd release-pkg
          tar czf ../jarvit-vm.tar.gz .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jarvit-vm.tar.gz
            manifest.json
            CHANGELOG.md
          make_latest: true
          generate_release_notes: true
